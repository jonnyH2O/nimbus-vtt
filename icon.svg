<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed background so the icon survives circular/maskable cropping -->
  <rect width="512" height="512" fill="#1a1208"/>
  <rect x="56" y="56" width="400" height="400" rx="28" fill="#231c12" stroke="#3a2410" stroke-width="6"/>
  <!-- Token ring motif -->
  <circle cx="256" cy="256" r="132" fill="none" stroke="#8a6a3a" stroke-width="4"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="#c4862a" stroke-width="14"/>
  <!-- Monogram (Cinzel not available at icon render time; falls back to serif) -->
  <text x="256" y="262" font-family="Cinzel, Georgia, 'Times New Roman', serif" font-size="180"
        font-weight="700" fill="#e8c878" text-anchor="middle" dominant-baseline="central">N</text>
</svg>
