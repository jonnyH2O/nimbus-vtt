<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Rain's Table</title>

<!-- Installable / standalone: launch from the Home Screen with no browser chrome,
     which also stops accidental pull-to-refresh reloads on mobile. -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1a1208" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="Rain's Table" />
<link rel="icon" type="image/png" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />

<link rel="stylesheet" href="css/style.css" />
<script defer src="js/state.js"></script>
<script defer src="js/board.js"></script>
<script defer src="js/tokens.js"></script>
<script defer src="js/grid.js"></script>
<script defer src="js/pathfinding.js"></script>
<script defer src="js/drawing.js"></script>
<script defer src="js/background.js"></script>
<script defer src="js/saveload.js"></script>
<script defer src="js/main.js"></script>
</head>
<body data-theme="autumn-hearth">

<div id="main">
  <div id="canvas-wrap">
    <div id="world">
      <div id="bg-img-wrap"></div>
      <canvas id="grid-canvas" width="2560" height="2560"></canvas>
      <canvas id="drawing-layer" width="2560" height="2560"></canvas>
      <div id="obstacle-layer"></div>
      <div id="path-layer"></div>
      <div id="token-layer"></div>
    </div>
  </div>
  <div id="hint"></div>
</div>

<div class="panel-buttons open" id="panel-dock">
  <div class="dock-items">
    <button id="btn-panel-drawing" class="panel-btn" onclick="togglePanel('drawing')" title="Drawing"><svg class="icon"><use href="icons/icons.svg#drawing"></use></svg></button>
    <button id="btn-panel-grid" class="panel-btn" onclick="togglePanel('grid')" title="Grid"><svg class="icon"><use href="icons/icons.svg#grid"></use></svg></button>
    <button id="btn-panel-tokens" class="panel-btn" onclick="togglePanel('tokens')" title="Tokens"><svg class="icon"><use href="icons/icons.svg#tokens"></use></svg></button>
    <button id="btn-panel-settings" class="panel-btn" onclick="togglePanel('settings')" title="Settings"><svg class="icon"><use href="icons/icons.svg#settings"></use></svg></button>
  </div>
  <button class="panel-btn dock-toggle" onclick="toggleDock()" title="Toggle toolbar"><svg class="icon"><use href="icons/icons.svg#arrow"></use></svg></button>
</div>

<div id="panel-drawing" class="panel">
  <div class="panel-header">Drawing</div>
  <div class="panel-body">
    <div class="panel-row">
      <span class="panel-row-label">Tool</span>
      <div class="tool-row">
        <button id="btn-tool-pen"    class="tool-btn" onclick="setDrawTool('pen')"    title="Draw"><svg class="icon"><use href="icons/icons.svg#pen"></use></svg></button>
        <button id="btn-tool-rect"   class="tool-btn" onclick="setDrawTool('rect')"   title="Rectangle"><svg class="icon"><use href="icons/icons.svg#rectangle"></use></svg></button>
        <button id="btn-tool-circle" class="tool-btn" onclick="setDrawTool('circle')" title="Circle"><svg class="icon"><use href="icons/icons.svg#circle"></use></svg></button>
        <button id="btn-tool-line"   class="tool-btn" onclick="setDrawTool('line')"   title="Line"><svg class="icon"><use href="icons/icons.svg#line"></use></svg></button>
        <button id="btn-tool-eraser" class="tool-btn" onclick="setDrawTool('eraser')" title="Eraser"><svg class="icon"><use href="icons/icons.svg#eraser"></use></svg></button>
      </div>
    </div>
    <div class="panel-row">
      <span class="panel-row-label">Color</span>
      <div class="color-row">
        <button class="swatch" data-color="#e04040" style="background:#e04040" onclick="setDrawColor('#e04040')"></button>
        <button class="swatch" data-color="#4080e0" style="background:#4080e0" onclick="setDrawColor('#4080e0')"></button>
        <button class="swatch" data-color="#50c060" style="background:#50c060" onclick="setDrawColor('#50c060')"></button>
        <button class="swatch" data-color="#e0c040" style="background:#e0c040" onclick="setDrawColor('#e0c040')"></button>
        <button class="swatch" data-color="#ffffff" style="background:#ffffff" onclick="setDrawColor('#ffffff')"></button>
        <button class="swatch" data-color="#e08040" style="background:#e08040" onclick="setDrawColor('#e08040')"></button>
        <input type="color" id="draw-color-picker" value="#e04040" onchange="setDrawColor(this.value)" />
      </div>
    </div>
    <div class="panel-row">
      <span class="panel-row-label">Brush Size</span>
      <input type="range" id="draw-size-slider" class="draw-slider" min="2" max="40" step="1" value="6" oninput="setDrawSize(this.value)" />
    </div>
    <button class="btn-icon" onclick="clearDrawing()" title="Clear Drawing"><svg class="icon"><use href="icons/icons.svg#trash"></use></svg> <span class="btn-label">Clear Drawing</span></button>
  </div>
</div>

<div id="panel-tokens" class="panel">
  <div class="panel-header">Tokens</div>
  <div class="panel-body">
    <div class="panel-row">
      <span class="panel-row-label">Name</span>
      <div class="input-row">
        <input type="text" id="name-input" placeholder="Name..." value="Token" />
        <input type="color" id="token-color" value="#3a7acc" title="Token color" />
      </div>
    </div>
    <div class="panel-row">
      <span class="panel-row-label">Picture</span>
      <div class="input-row">
        <button id="btn-upload-pic" onclick="uploadPicForDefault()">Upload Picture</button>
        <button class="btn-icon-only" onclick="clearCurrentTokenImage()" title="No picture"><svg class="icon"><use href="icons/icons.svg#close"></use></svg></button>
      </div>
    </div>
    <button class="btn-primary" onclick="addToken()">+ Place Token</button>
  </div>
</div>

<div id="panel-grid" class="panel">
  <div class="panel-header">Grid</div>
  <div class="panel-body">
    <button class="btn-primary btn-icon" onclick="startGridDraw()"><svg class="icon"><use href="icons/icons.svg#set-grid"></use></svg> Set Grid</button>
    <button class="btn-icon" onclick="userClearGrid()"><svg class="icon"><use href="icons/icons.svg#close"></use></svg> Clear Grid</button>
    <button id="btn-snap-toggle" class="btn-icon" onclick="toggleSnap()"><svg class="icon"><use href="icons/icons.svg#grid"></use></svg> Snap to Grid</button>
    <button id="btn-obstacle-toggle" class="btn-icon" onclick="toggleObstacleEdit()"><svg class="icon"><use href="icons/icons.svg#obstacle"></use></svg> Add Obstacle Cells</button>
  </div>
</div>

<div id="panel-settings" class="panel">
  <div class="panel-header">Settings</div>
  <div class="panel-body">
    <div class="panel-row">
      <span class="panel-row-label">Theme</span>
      <div class="select-wrap">
        <select id="theme-select" onchange="setTheme(this.value)">
          <option value="autumn-hearth">Autumn Hearth</option>
          <option value="midnight-nimbus">Midnight Nimbus</option>
          <option value="mist-and-moss">Mist and Moss</option>
        </select>
      </div>
    </div>
    <div class="panel-row">
      <span class="panel-row-label">Room</span>
      <div class="input-row">
        <input type="text" id="room-input" placeholder="room code" autocapitalize="none" autocorrect="off" spellcheck="false" />
        <button id="btn-copy-room" class="btn-icon-only" onclick="copyRoom()" title="Copy room code"><svg class="icon"><use href="icons/icons.svg#copy"></use></svg></button>
      </div>
      <button onclick="goToRoom()">→ Go to Room</button>
    </div>
    <div class="panel-row">
      <span class="panel-row-label">Board</span>
      <button class="btn-icon" onclick="saveBoard()"><svg class="icon"><use href="icons/icons.svg#save"></use></svg> Save</button>
      <button class="btn-icon" onclick="document.getElementById('load-input').click()"><svg class="icon"><use href="icons/icons.svg#folder"></use></svg> Load</button>
    </div>
  </div>
</div>

<div id="ctx-menu" class="ctx-menu">
  <div class="ctx-item" onclick="ctxRename()"><svg class="icon"><use href="icons/icons.svg#pen"></use></svg> Rename</div>
  <div class="ctx-item" onclick="ctxRecolor()"><svg class="icon"><use href="icons/icons.svg#palette"></use></svg> Recolor</div>
  <div class="ctx-item" onclick="ctxChangePicture()"><svg class="icon"><use href="icons/icons.svg#image"></use></svg> Change Picture</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDelete()"><svg class="icon"><use href="icons/icons.svg#close"></use></svg> Remove</div>
</div>

<div id="bg-ctx-menu" class="ctx-menu">
  <div class="ctx-item" onclick="bgCtxLoad()"><svg class="icon"><use href="icons/icons.svg#folder"></use></svg> Load Background</div>
  <div class="ctx-item" onclick="bgCtxClear()"><svg class="icon"><use href="icons/icons.svg#close"></use></svg> Clear Background</div>
  <div class="ctx-item" onclick="bgCtxRotate()"><svg class="icon"><use href="icons/icons.svg#rotate"></use></svg> Rotate Background</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="bgCtxClearAll()"><svg class="icon"><use href="icons/icons.svg#trash"></use></svg> Clear All Tokens</div>
</div>

<input type="file" id="file-input" accept="image/*" onchange="loadBG(event)" />
<input type="file" id="token-pic-input" accept="image/*" onchange="handleTokenPicUpload(event)" />
<input type="file" id="load-input" accept=".json,application/json" onchange="loadBoardFile(event)" />

<div id="crop-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Crop Token Image</div>
    <div class="modal-body">
      <div id="crop-area" class="crop-area">
        <div id="crop-image-wrap" class="crop-image-wrap">
          <img id="crop-image" alt="" />
        </div>
        <div class="crop-circle"></div>
      </div>
      <div class="modal-hint">Drag to pan · Scroll to zoom</div>
      <div class="modal-actions">
        <button onclick="cancelCrop()">Cancel</button>
        <button class="btn-primary" onclick="acceptCrop()">Use Image</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
