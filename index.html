<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Virtual Tabletop</title>
<link rel="stylesheet" href="css/style.css" />
<script defer src="js/tokens.js"></script>
<script defer src="js/board.js"></script>
</head>
<body>

<div id="toolbar">
  <h1>⚔ VTT</h1>
  <div class="tb-sep"></div>
  <span class="tb-label">Token</span>
  <input type="text" id="name-input" placeholder="Name..." value="Hero" />
  <input type="color" id="token-color" value="#3a7acc" title="Token color" />
  <button id="btn-hero" class="active" onclick="setType('hero')">🧙 Hero</button>
  <button id="btn-enemy" onclick="setType('enemy')">💀 Enemy</button>
  <button onclick="addToken()">+ Place Token</button>

  <div class="tb-sep"></div>
  <span class="tb-label">Map</span>
  <button onclick="document.getElementById('file-input').click()">📁 Load Background</button>
  <button onclick="clearBG()">✕ Clear BG</button>

  <div class="tb-sep"></div>
  <button onclick="clearAll()" style="color:#c06050;border-color:#602020;">🗑 Clear All</button>
</div>

<div id="main">
  <div id="canvas-wrap">
    <div id="bg-layer">
      <div id="bg-img-wrap" style="position:absolute;inset:0;"></div>
    </div>
    <div id="token-layer"></div>
  </div>
  <div id="hint">Place a token above, or right-click a token for options · Delete key removes selected</div>
</div>

<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxRename()">✏ Rename</div>
  <div class="ctx-item" onclick="ctxRecolor()">🎨 Recolor</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxToggleType()">🔄 Toggle Type</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDelete()">✕ Remove</div>
</div>

<input type="file" id="file-input" accept="image/*" onchange="loadBG(event)" />

</body>
</html>
