<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Virtual Tabletop</title>
<link rel="stylesheet" href="css/style.css" />
<script defer src="js/tokens.js"></script>
<script defer src="js/board.js"></script>
<script defer src="js/background.js"></script>
<script defer src="js/grid.js"></script>
<script defer src="js/pathfinding.js"></script>
<script defer src="js/drawing.js"></script>
<script defer src="js/saveload.js"></script>
</head>
<body data-theme="autumn-hearth">

<div id="main">
  <div id="canvas-wrap">
    <div id="world">
      <div id="bg-grid"></div>
      <div id="bg-img-wrap"></div>
      <canvas id="grid-canvas" width="4000" height="4000"></canvas>
      <canvas id="drawing-layer" width="4000" height="4000"></canvas>
      <div id="obstacle-layer"></div>
      <div id="path-layer"></div>
      <div id="token-layer"></div>
    </div>
  </div>
  <div id="hint"></div>
</div>

<div class="panel-buttons">
  <button id="btn-panel-drawing" class="panel-btn" onclick="togglePanel('drawing')" title="Drawing">🖌</button>
  <button id="btn-panel-grid" class="panel-btn" onclick="togglePanel('grid')" title="Grid">⊞</button>
  <button id="btn-panel-tokens" class="panel-btn" onclick="togglePanel('tokens')" title="Tokens">♟</button>
  <button id="btn-panel-settings" class="panel-btn" onclick="togglePanel('settings')" title="Settings">⚙</button>
</div>

<div id="panel-drawing" class="panel">
  <div class="panel-header">Drawing</div>
  <div class="panel-body">
    <div class="panel-row">
      <span class="panel-row-label">Tool</span>
      <div class="tool-row">
        <button id="btn-tool-pen"    class="tool-btn" onclick="setDrawTool('pen')"    title="Draw">✏</button>
        <button id="btn-tool-rect"   class="tool-btn" onclick="setDrawTool('rect')"   title="Rectangle">⬜</button>
        <button id="btn-tool-circle" class="tool-btn" onclick="setDrawTool('circle')" title="Circle">⭕</button>
        <button id="btn-tool-line"   class="tool-btn" onclick="setDrawTool('line')"   title="Line">➖</button>
        <button id="btn-tool-eraser" class="tool-btn" onclick="setDrawTool('eraser')" title="Eraser">◻</button>
      </div>
    </div>
    <div class="panel-row">
      <span class="panel-row-label">Color</span>
      <div class="color-row">
        <button class="swatch" data-color="#e04040" style="background:#e04040" onclick="setDrawColor('#e04040')"></button>
        <button class="swatch" data-color="#4080e0" style="background:#4080e0" onclick="setDrawColor('#4080e0')"></button>
        <button class="swatch" data-color="#50c060" style="background:#50c060" onclick="setDrawColor('#50c060')"></button>
        <button class="swatch" data-color="#e0c040" style="background:#e0c040" onclick="setDrawColor('#e0c040')"></button>
        <button class="swatch" data-color="#ffffff" style="background:#ffffff" onclick="setDrawColor('#ffffff')"></button>
        <button class="swatch" data-color="#e08040" style="background:#e08040" onclick="setDrawColor('#e08040')"></button>
        <input type="color" id="draw-color-picker" value="#e04040" onchange="setDrawColor(this.value)" />
      </div>
    </div>
    <div class="panel-row">
      <span class="panel-row-label">Brush Size</span>
      <input type="range" id="draw-size-slider" class="draw-slider" min="2" max="40" step="1" value="6" oninput="setDrawSize(this.value)" />
    </div>
    <button onclick="clearDrawing()">🗑 Clear Drawing</button>
  </div>
</div>

<div id="panel-tokens" class="panel">
  <div class="panel-header">Tokens</div>
  <div class="panel-body">
    <div class="panel-row">
      <span class="panel-row-label">Name</span>
      <div class="input-row">
        <input type="text" id="name-input" placeholder="Name..." value="Token" />
        <input type="color" id="token-color" value="#3a7acc" title="Token color" />
      </div>
    </div>
    <div class="panel-row">
      <span class="panel-row-label">Picture</span>
      <div class="input-row">
        <button id="btn-upload-pic" onclick="uploadPicForDefault()">Upload Picture</button>
        <button onclick="clearCurrentTokenImage()" title="No picture">✕</button>
      </div>
    </div>
    <button class="btn-primary" onclick="addToken()">+ Place Token</button>
  </div>
</div>

<div id="panel-grid" class="panel">
  <div class="panel-header">Grid</div>
  <div class="panel-body">
    <button class="btn-primary" onclick="startGridDraw()">📐 Set Grid</button>
    <button onclick="clearGrid()">✕ Clear Grid</button>
    <button id="btn-snap-toggle" onclick="toggleSnap()">⊞ Snap to Grid</button>
    <button id="btn-obstacle-toggle" onclick="toggleObstacleEdit()">🚫 Add Obstacle Cells</button>
  </div>
</div>

<div id="panel-settings" class="panel">
  <div class="panel-header">Settings</div>
  <div class="panel-body">
    <div class="panel-row">
      <span class="panel-row-label">Theme</span>
      <div class="select-wrap">
        <select id="theme-select" onchange="setTheme(this.value)">
          <option value="autumn-hearth">Autumn Hearth</option>
          <option value="midnight-nimbus">Midnight Nimbus</option>
          <option value="mist-and-moss">Mist and Moss</option>
        </select>
      </div>
    </div>
    <div class="panel-row">
      <span class="panel-row-label">Board</span>
      <button onclick="saveBoard()">💾 Save</button>
      <button onclick="document.getElementById('load-input').click()">📂 Load</button>
    </div>
  </div>
</div>

<div id="ctx-menu" class="ctx-menu">
  <div class="ctx-item" onclick="ctxRename()">✏ Rename</div>
  <div class="ctx-item" onclick="ctxRecolor()">🎨 Recolor</div>
  <div class="ctx-item" onclick="ctxChangePicture()">🖼 Change Picture</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDelete()">✕ Remove</div>
</div>

<div id="bg-ctx-menu" class="ctx-menu">
  <div class="ctx-item" onclick="bgCtxLoad()">📁 Load Background</div>
  <div class="ctx-item" onclick="bgCtxClear()">✕ Clear Background</div>
  <div class="ctx-item" onclick="bgCtxRotate()">🔄 Rotate Background</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="bgCtxClearAll()">🗑 Clear All Tokens</div>
</div>

<input type="file" id="file-input" accept="image/*" onchange="loadBG(event)" />
<input type="file" id="token-pic-input" accept="image/*" onchange="handleTokenPicUpload(event)" />
<input type="file" id="load-input" accept=".json,application/json" onchange="loadBoardFile(event)" />

<div id="crop-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Crop Token Image</div>
    <div class="modal-body">
      <div id="crop-area" class="crop-area">
        <div id="crop-image-wrap" class="crop-image-wrap">
          <img id="crop-image" alt="" />
        </div>
        <div class="crop-circle"></div>
      </div>
      <div class="modal-hint">Drag to pan · Scroll to zoom</div>
      <div class="modal-actions">
        <button onclick="cancelCrop()">Cancel</button>
        <button class="btn-primary" onclick="acceptCrop()">Use Image</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
